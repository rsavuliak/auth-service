name: Deploy Auth Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонування репозиторію
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Налаштування SSH з ключа
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      # 3. Перевірка підключення до сервера
      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.USERNAME }}@${{ secrets.HOST }} "echo '✅ SSH connection works'"

      # 4.Збірка JAR
      - name: Build project
        run: ./mvnw clean package -DskipTests

      # 5. Підготовка deploy-папки
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r target deploy/
          cp docker-compose.yml deploy/
          cp Dockerfile deploy/

      # 6. Копіювання на сервер через rsync
      - name: Copy files to droplet
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" ./deploy/ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/home/deploy/auth-service

      # 7. Деплой на сервері
      - name: Run docker compose on server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            cd /home/deploy/auth-service

            echo "SPRING_DATASOURCE_URL=${{ secrets.ENV_SPRING_DATASOURCE_URL }}" > .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.ENV_SPRING_DATASOURCE_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.ENV_SPRING_DATASOURCE_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.ENV_JWT_SECRET }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            echo "APP_BASE_URL=${{ vars.APP_BASE_URL }}" >> .env
            echo "FRONTEND_URL=${{ vars.FRONTEND_URL }}" >> .env
            echo "CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}" >> .env
            echo "COOKIE_DOMAIN=${{ vars.COOKIE_DOMAIN }}" >> .env

            docker compose up -d --build --no-deps auth-service

            echo "⏳ waiting for auth-service to become ready (max 90s)..."
            for i in $(seq 1 30); do
              LOG=$(docker logs --since 2m auth-service-auth-service-1 2>&1 || true)
              if echo "$LOG" | grep -q "Started AuthServiceApplication"; then
                echo "✅ auth-service started"
                exit 0
              fi
              if echo "$LOG" | grep -q "password authentication failed"; then
                echo "❌ DB password mismatch — auth-service cannot connect to postgres."
                echo "   Run on the server:"
                echo "     docker exec auth-postgres psql -U postgres -c \"ALTER USER postgres WITH PASSWORD '<value of SPRING_DATASOURCE_PASSWORD>';\""
                echo "   then re-run this deploy. See CLAUDE.md → Deployment → Rotating the DB password."
                exit 1
              fi
              sleep 3
            done
            echo "❌ auth-service did not report 'Started AuthServiceApplication' within 90s. Recent logs:"
            docker logs --tail 60 auth-service-auth-service-1 2>&1
            exit 1
          EOF