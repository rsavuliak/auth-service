server:
  port: 8080
  servlet:
    context-path: /

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  test:
    database:
      replace: none
jwt:
    secret: ${JWT_SECRET}
    refresh-token:
      expiration-ms: 2592000000
    access-token:
        expiration-ms: 900000
google:
  client-id: 424121716950-g87ltpn5f3q6q4gl169frn9fp046i7rd.apps.googleusercontent.com
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: https://auth.savuliak.com/api/v1/auth/oauth/google
