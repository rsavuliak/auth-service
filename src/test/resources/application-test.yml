server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/auth_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  test:
    database:
      replace: none
jwt:
  secret: ${JWT_SECRET}
  refresh-token:
    expiration-ms: 604800000 # 7 days

app:
  base-url: http://localhost:8080
  frontend-url: http://localhost:5173
  email-verification:
    token-expiry-minutes: 60
    resend-cooldown-minutes: 5
